<html lang="en">

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg-primary:#ffffff;--bg-secondary:#f5f5f4;--bg-tertiary:#efede8;
    --text-primary:#1a1a18;--text-secondary:#73726c;--text-tertiary:#9c9a92;
    --border:rgba(0,0,0,0.12);--border-md:rgba(0,0,0,0.20);
    --radius-md:8px;--radius-lg:12px;
    --green:#1D9E75;--green-bg:#E1F5EE;--green-txt:#0F6E56;
    --amber:#EF9F27;--amber-bg:#FAEEDA;--amber-txt:#854F0B;
    --red:#E24B4A;--red-bg:#FCEBEB;--red-txt:#A32D2D;
    --blue:#378ADD;--blue-dark:#185FA5;--blue-bg:#E6F1FB;--blue-txt:#0C447C;
    --purple:#534AB7;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg-primary:#1c1c1a;--bg-secondary:#252523;--bg-tertiary:#2c2c2a;
      --text-primary:#e8e6e0;--text-secondary:#9c9a92;--text-tertiary:#73726c;
      --border:rgba(255,255,255,0.10);--border-md:rgba(255,255,255,0.18);
      --green:#5DCAA5;--green-bg:#085041;--green-txt:#9FE1CB;
      --amber:#EF9F27;--amber-bg:#633806;--amber-txt:#FAC775;
      --red:#F09595;--red-bg:#791F1F;--red-txt:#F7C1C1;
      --blue:#85B7EB;--blue-dark:#B5D4F4;--blue-bg:#0C447C;--blue-txt:#B5D4F4;
    }
  }
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg-tertiary);color:var(--text-primary);min-height:100vh}
  a{color:var(--blue);text-decoration:none}
  a:hover{text-decoration:underline}

  /* ── Top bar ── */
  .topbar{background:var(--bg-primary);border-bottom:0.5px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:12px;height:54px;position:sticky;top:0;z-index:100}
  .logo{font-size:15px;font-weight:600;flex:1;color:var(--text-primary)}
  .logo span{color:var(--green)}
  .wpill{display:flex;align-items:center;gap:7px;background:var(--bg-secondary);border:0.5px solid var(--border);border-radius:20px;padding:6px 14px;font-size:11px;color:var(--text-secondary);font-family:monospace}
  .wdot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
  .cbadge{background:var(--blue-bg);color:var(--blue-txt);font-size:10px;padding:3px 9px;border-radius:10px;font-weight:600}
  .updated{font-size:11px;color:var(--text-tertiary)}
  .topbar-right{display:flex;align-items:center;gap:8px}

  /* ── Nav ── */
  .nav{background:var(--bg-primary);border-bottom:0.5px solid var(--border);padding:0 24px;display:flex;gap:0;overflow-x:auto}
  .navbtn{padding:11px 18px;font-size:12px;font-weight:500;color:var(--text-secondary);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:color .15s}
  .navbtn.active{color:var(--text-primary);border-bottom-color:var(--blue)}
  .navbtn:hover:not(.active){color:var(--text-primary)}

  /* ── Pages ── */
  .page{display:none;padding:20px 24px 48px;max-width:1100px;margin:0 auto}
  .page.active{display:block}

  /* ── KPI strip ── */
  .krow{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
  @media(max-width:860px){.krow{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:500px){.krow{grid-template-columns:repeat(2,1fr)}}
  .kpi{background:var(--bg-secondary);border-radius:var(--radius-md);padding:14px 16px}
  .kl{font-size:10px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;font-weight:500}
  .kv{font-size:22px;font-weight:600;line-height:1.1}
  .ks{font-size:11px;color:var(--text-secondary);margin-top:3px}

  /* ── Section label ── */
  .slab{font-size:10px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;margin:0 0 10px}

  /* ── Cards ── */
  .card{background:var(--bg-primary);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px}
  .g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  @media(max-width:640px){.g2,.g3{grid-template-columns:1fr}}
  .mb{margin-bottom:14px}

  /* ── Position cards ── */
  .pcard{background:var(--bg-primary);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:12px;position:relative}
  .rstripe{position:absolute;left:0;top:0;bottom:0;width:4px}
  .pinner{padding:16px 18px 0 22px}
  .ptop{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .picon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
  .pname{font-size:15px;font-weight:600}
  .pmeta{font-size:11px;color:var(--text-secondary);margin-top:2px}
  .pbadges{margin-left:auto;display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}

  /* ── Badges ── */
  .badge{font-size:10px;padding:3px 9px;border-radius:10px;font-weight:600;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
  .bg{background:var(--green-bg);color:var(--green-txt)}
  .ba{background:var(--amber-bg);color:var(--amber-txt)}
  .br{background:var(--red-bg);color:var(--red-txt)}
  .bb{background:var(--blue-bg);color:var(--blue-txt)}
  .rdot{width:6px;height:6px;border-radius:50%;display:inline-block}

  /* ── Metrics grid ── */
  .pg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
  @media(max-width:480px){.pg{grid-template-columns:repeat(2,1fr)}}
  .pm{display:flex;flex-direction:column;gap:2px}
  .pml{font-size:9px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.05em;font-weight:500}
  .pmv{font-size:14px;font-weight:600}
  .pms{font-size:11px;color:var(--text-secondary)}

  /* ── Range bar ── */
  .rwrap{margin-bottom:14px}
  .rlbls{display:flex;justify-content:space-between;font-size:10px;color:var(--text-secondary);margin-bottom:5px}
  .rbar{height:6px;background:var(--bg-secondary);border-radius:3px;position:relative}
  .rfill{height:100%;border-radius:3px;background:var(--blue-bg)}
  .rtick{position:absolute;top:-4px;width:2px;height:14px;border-radius:1px;transform:translateX(-50%)}

  /* ── IL + Break-even ── */
  .ilbe{display:grid;grid-template-columns:1fr 1fr;border-top:0.5px solid var(--border);border-bottom:0.5px solid var(--border)}
  .ils{padding:12px 14px;border-right:0.5px solid var(--border)}
  .bes{padding:12px 14px}
  .isl{font-size:9px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.05em;font-weight:500;margin-bottom:8px}
  .il4{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .ili{display:flex;flex-direction:column;gap:1px}
  .ill{font-size:9px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em}
  .ilv{font-size:13px;font-weight:600}
  .bedays{font-size:22px;font-weight:700}
  .bebar{height:5px;background:var(--bg-secondary);border-radius:3px;margin:6px 0 4px;overflow:hidden}
  .befill{height:100%;border-radius:3px}

  /* ── Position allocation bar ── */
  .palrow{padding:12px 14px;border-top:0.5px solid var(--border)}
  .palseg-wrap{display:flex;gap:3px;height:7px;border-radius:4px;overflow:hidden;margin:6px 0 5px}
  .palseg{height:7px;min-width:4px}
  .palleg{display:flex;gap:10px;flex-wrap:wrap}
  .pali{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-secondary)}
  .paldot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

  /* ── Donut chart ── */
  .dwrap{position:relative;width:140px;height:140px;margin:10px auto 0}
  .dcenter{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
  .dtotal{font-size:17px;font-weight:700}
  .dsub{font-size:10px;color:var(--text-secondary)}
  .dleg{display:flex;flex-direction:column;gap:6px;margin-top:12px}
  .dlegrow{display:flex;align-items:center;gap:7px;font-size:12px}
  .dlegdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .dlegname{flex:1;color:var(--text-primary)}
  .dlegpct{font-weight:600;font-size:12px;color:var(--text-primary)}

  /* ── Yield table ── */
  .ytbl{width:100%;font-size:13px;border-collapse:collapse;margin-top:10px}
  .ytbl th{font-size:10px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.05em;text-align:left;padding:4px 0 6px;border-bottom:0.5px solid var(--border)}
  .ytbl td{padding:8px 0;border-bottom:0.5px solid var(--border)}
  .ytbl tr:last-child td{border-bottom:none}
  .yd{font-weight:600}.yp{color:var(--green);font-size:11px;margin-top:2px}

  /* ── Risk scorecard ── */
  .rsrow{padding:14px 0;border-bottom:0.5px solid var(--border)}
  .rsrow:last-child{border-bottom:none}
  .rshead{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
  .rsname{font-size:14px;font-weight:600;flex:1}
  .rsscore{font-size:20px;font-weight:700}
  .rsbar{height:5px;background:var(--bg-secondary);border-radius:3px;margin-bottom:10px;overflow:hidden}
  .rsfill{height:100%;border-radius:3px}
  .rsfacts{display:flex;flex-direction:column;gap:4px}
  .rsfrow{display:flex;align-items:center;gap:8px}
  .rsfname{font-size:10px;color:var(--text-secondary);min-width:95px;font-weight:500}
  .rsfsbar{flex:1;height:3px;background:var(--bg-secondary);border-radius:2px;overflow:hidden}
  .rsfsfill{height:100%;border-radius:2px}
  .rsfscore{font-size:10px;font-weight:700;min-width:16px;text-align:right;color:var(--text-primary)}
  .rsfnote{font-size:10px;color:var(--text-secondary);flex:2;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* ── Misc ── */
  .arch-note{background:var(--bg-secondary);border:0.5px solid var(--border);border-radius:var(--radius-md);padding:14px 16px;font-size:12px;color:var(--text-secondary);line-height:1.7}
  .arch-note strong{color:var(--text-primary)}
  code{background:var(--bg-tertiary);padding:1px 5px;border-radius:4px;font-size:11px;font-family:monospace}
  .footer{text-align:center;padding:32px 24px 16px;font-size:12px;color:var(--text-tertiary)}
  .rktier{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .rktile{flex:1;min-width:160px;border-radius:var(--radius-md);padding:14px;text-align:center;border:0.5px solid var(--border)}
  .rktile-v{font-size:20px;font-weight:700}
  .rktile-l{font-size:11px;margin-top:3px;font-weight:500}
  .rktile-s{font-size:10px;margin-top:2px;opacity:.8}
  .fbox{background:var(--bg-secondary);border-radius:var(--radius-md);padding:10px 12px;font-size:12px;color:var(--text-secondary);line-height:1.6;margin-bottom:8px}
  .fbox strong{color:var(--text-primary)}

  @media print{.topbar,.nav{position:static}.page{padding:10px}}
</style>
</head>

<script>

const ACOLORS = {BTC:"#F7A93B",ETH:"#627EEA",SOL:"#9945FF",Stables:"#27B77A",Other:"#8896A8"};
const RCOL = {low:"#1D9E75",mid:"#EF9F27",high:"#E24B4A"};
const RBGCOL = {low:"#E1F5EE",mid:"#FAEEDA",high:"#FCEBEB"};
const RTXTCOL = {low:"#0F6E56",mid:"#854F0B",high:"#A32D2D"};
const FCOLS = ["#378ADD","#9945FF","#EF9F27","#1D9E75","#E24B4A"];
const FLABELS = ["Volatility","IL exposure","Range prox.","Pool maturity","Net vs hold"];

const P = [
  {id:"2044566",pair:"USDC/cbBTC",dex:"PancakeSwap",days:14,
   value:172.10,dpd:0.51,apr:107.8,rebals:5,

   portAlloc:{ETH:29,BTC:71},col:"#185FA5"},
  {id:"72276604",pair:"WETH/uSOL",dex:"Aerodrome",days:3,

function fmtScore(p){const s=["vol","il","rng","mat","net"].reduce((a,k)=>a+p.factors[k].s,0);return{score:s,tier:s<=4?"low":s<=7?"mid":"high"};}
function calcIL(p){const hold=p.qtyA*p.pxAn+p.qtyB*p.pxBn;const il=p.value-hold;return{hold,il,net:il+p.earned};}
function calcBE(p){const{net}=calcIL(p);if(net>=0)return{status:"achieved",days:0,pct:100};const rem=Math.abs(net);const dL=p.dpd>0?rem/p.dpd:9999;const tot=p.earned/p.dpd+dL;return{status:"pending",days:dL,pct:Math.min(99,Math.round(p.days/tot*100))};}
function rngPct(p){return Math.min(100,Math.max(0,(p.cur-p.lower)/(p.upper-p.lower)*100));}
function fmtC(p,n=0){return p.lower>1?"$"+p.cur.toLocaleString("en-US",{maximumFractionDigits:n}):p.cur.toFixed(6);}
function fmtL(p){return p.lower>1?"$"+p.lower.toLocaleString("en-US",{maximumFractionDigits:0}):p.lower.toFixed(6);}
function fmtU(p){return p.upper>1?"$"+p.upper.toLocaleString("en-US",{maximumFractionDigits:0}):p.upper.toFixed(6);}
function f(n,d=2){return typeof n==="number"?n.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d}):"—";}
function fS(n){return(n>=0?"+$":"-$")+f(Math.abs(n));}
function fP(n){return f(n,1)+"%";}

const enriched = P.map(p=>{const{score,tier}=fmtScore(p);return{...p,score,tier,il:calcIL(p),be:calcBE(p)};});
const totVal = enriched.reduce((s,p)=>s+p.value,0);
const totEarn = enriched.reduce((s,p)=>s+p.earned,0);
const totUncol = enriched.reduce((s,p)=>s+p.uncollected,0);
const totDpd = enriched.reduce((s,p)=>s+p.dpd,0);
const wApr = enriched.reduce((s,p)=>s+p.value*p.apr,0)/totVal;
const totNet = enriched.reduce((s,p)=>s+p.il.net,0);
const totIL = enriched.reduce((s,p)=>s+p.il.il,0);

function showPage(id){
  document.querySelectorAll(".page").forEach(el=>el.classList.remove("active"));
  document.querySelectorAll(".navbtn").forEach(el=>el.classList.remove("active"));
  document.getElementById("page-"+id).classList.add("active");
  document.querySelectorAll(".navbtn").forEach(el=>{if(el.textContent.toLowerCase().startsWith(id))el.classList.add("active");});
}

function badge(tier){
  const cls={low:"bg",mid:"ba",high:"br"}[tier];
  const lbl={low:"Low risk",mid:"Mid risk",high:"High risk"}[tier];
  return`<span class="badge ${cls}">${lbl}</span>`;
}

function donut(canvasId,segments,totalLabel,subLabel,legendId){
  const ctx=document.getElementById(canvasId).getContext("2d");
  const tot=segments.reduce((s,x)=>s+x.v,0);
  new Chart(ctx,{type:"doughnut",data:{labels:segments.map(x=>x.l),datasets:[{data:segments.map(x=>x.v),backgroundColor:segments.map(x=>x.c),borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:"60%",plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.label}: ${(c.raw/tot*100).toFixed(1)}%`}}}}});
  document.getElementById("donut-total-"+canvasId).textContent=totalLabel;
  document.getElementById("donut-sub-"+canvasId).textContent=subLabel;
  document.getElementById(legendId).innerHTML=segments.map(x=>`<div class="dlegrow"><span class="dlegdot" style="background:${x.c}"></span><span class="dlegname">${x.l}</span><span class="dlegpct">${(x.v/tot*100).toFixed(1)}%</span></div>`).join("");
}

function rangebar(p){
  const rp=rngPct(p);
  const tc=p.inRange?"#378ADD":"#E24B4A";
  return`<div class="rwrap">
    <div class="rlbls"><span>${fmtL(p)}</span><span style="font-weight:600;color:${tc}">Now: ${fmtC(p)}</span><span>${fmtU(p)}</span></div>
    <div class="rbar"><div class="rfill" style="width:${rp.toFixed(1)}%"></div><div class="rtick" style="left:${rp.toFixed(1)}%;background:${tc}"></div></div>
  </div>`;
}

function ilbeBlock(p){
  const{hold,il,net}=p.il;
  const be=p.be;
  const ic=il>=0?"var(--green)":"var(--red)";
  const nc=net>=0?"var(--green)":"var(--red)";

      <div style="overflow-x:auto"><table style="width:100%;font-size:13px;border-collapse:collapse;min-width:400px">
        <thead><tr>${["Position","Risk","Value","% portfolio","Dominant asset","Annual yield"].map(h=>`<th style="font-size:10px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;padding:4px 8px 7px 0;text-align:left;border-bottom:0.5px solid var(--border);letter-spacing:.05em">${h}</th>`).join("")}</tr></thead>
        <tbody>${enriched.map(p=>`<tr><td style="padding:8px 8px 8px 0;border-bottom:0.5px solid var(--border);font-weight:600">${p.pair}</td><td style="padding:8px 8px 8px 0;border-bottom:0.5px solid var(--border)">${badge(p.tier)}</td><td style="padding:8px 8px 8px 0;border-bottom:0.5px solid var(--border)">$${f(p.value)}</td><td style="padding:8px 8px 8px 0;border-bottom:0.5px solid var(--border)">${fP(p.value/totVal*100)}</td><td style="padding:8px 8px 8px 0;border-bottom:0.5px solid var(--border)">${p.posAlloc.sort((a,b)=>b.p-a.p)[0].n}</td><td style="padding:8px 8px 8px 0;border-bottom:0.5px solid var(--border);color:var(--green);font-weight:600">$${f(p.dpd*365,0)}</td></tr>`).join("")}</tbody>
      </table></div>
    </div>`;
  setTimeout(()=>{
    donut("d-alloc",entries.map(([k,v])=>({l:k,v,c:ACOLORS[k]||"#8896A8"})),"$"+f(tot,0),"portfolio","dleg-alloc");
  },50);
}

buildOverview();buildPositions();buildRisk();buildYield();buildAllocation();

setTimeout(()=>{
  const pb={};enriched.forEach(p=>Object.entries(p.portAlloc).forEach(([k,pct])=>{pb[k]=(pb[k]||0)+(p.value*pct/100);}));
  const pt=Object.values(pb).reduce((a,b)=>a+b,0);
  donut("d-port",Object.entries(pb).sort((a,b)=>b[1]-a[1]).map(([k,v])=>({l:k,v,c:ACOLORS[k]||"#8896A8"})),"$"+f(pt,0),"portfolio","dleg-port");
  const byT={low:0,mid:0,high:0};enriched.forEach(p=>byT[p.tier]+=p.value);
  donut("d-risk",[{l:"Low",v:byT.low,c:RCOL.low},{l:"Mid",v:byT.mid,c:RCOL.mid},{l:"High",v:byT.high,c:RCOL.high}].filter(x=>x.v>0),"$"+f(totVal,0),"by risk","dleg-risk");
},100);
</script>
